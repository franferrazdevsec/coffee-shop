name: DevSecOps Local Pipeline 

on: 
 push: 
  branches: [main] 
 workflow_dispatch: 

jobs: 
 build-and-scan: 
  runs-on: ubuntu-latest 
  
steps: 
- name: Checkout repo 
uses: actions/checkout@v3 

- name: Run Semgrep
uses: returntocorp/semgrep-action@v1 
with: 
  config: "p/default" 

- name: Scan com Trivy 
  uses: aquasecurity/trivy-action@master 
  with: 
  image-ref: 'registry.gitlab.com/o_sgoncalves/coffee-shop:latest' 
  format: 'table' 
  
  - name: Docker build 
    run: docker build -t coffee-shop:local . 
    
  - name: Deploy para Kind 
    run: | 
      kubectl apply -f k8s/coffee-shop-deployment.yaml
      
